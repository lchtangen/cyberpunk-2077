# cp2077-linux-hud — hyprlock config
# Cyberpunk 2077 lock screen for Hyprland
# Copy to ~/.config/hypr/hyprlock.conf

general {
  disable_loading_bar  = false
  hide_cursor          = true
  grace                = 0
  no_fade_in           = false
  no_fade_out          = false
  ignore_empty_input   = true
}

# ── Background ────────────────────────────────────────────────────
background {
  monitor     =
  path        = screenshot   # blur the current desktop
  blur_size   = 7
  blur_passes = 3
  brightness  = 0.3
  contrast    = 1.0
  vibrancy    = 0.15

  # Optional: set a CP2077 wallpaper instead of screenshot
  # path = ~/.config/wallpapers/cp2077-nightcity.jpg
}

# ── Decorative top accent bar ─────────────────────────────────────
shape {
  monitor  =
  size     = 100% 3
  color    = rgba(252, 238, 12, 0.85)
  position = 0, -1
  halign   = left
  valign   = top
  zindex   = 10
}

# ── CP2077 title ──────────────────────────────────────────────────
label {
  monitor    =
  text       = ░▒▓  CYBERPUNK 2077  ▓▒░
  color      = rgba(252, 238, 12, 0.90)
  font_size  = 22
  font_family= JetBrains Mono Bold
  position   = 0, 120
  halign     = center
  valign     = center
  shadow_passes = 2
  shadow_size   = 5
  shadow_color  = rgba(252, 238, 12, 0.3)
  shadow_boost  = 1.2
}

# ── Subtitle ──────────────────────────────────────────────────────
label {
  monitor    =
  text       = NIGHT CITY NEVER SLEEPS
  color      = rgba(0, 255, 255, 0.50)
  font_size  = 10
  font_family= JetBrains Mono
  position   = 0, 88
  halign     = center
  valign     = center
}

# ── Clock ─────────────────────────────────────────────────────────
label {
  monitor    =
  text       = cmd[update:1000] date '+%H:%M:%S'
  color      = rgba(0, 255, 255, 0.95)
  font_size  = 52
  font_family= JetBrains Mono Bold
  position   = 0, 20
  halign     = center
  valign     = center
  shadow_passes = 1
  shadow_size   = 8
  shadow_color  = rgba(0, 255, 255, 0.25)
}

# ── Date ──────────────────────────────────────────────────────────
label {
  monitor    =
  text       = cmd[update:60000] date '+%A, %d %B %Y'
  color      = rgba(170, 170, 170, 0.60)
  font_size  = 12
  font_family= JetBrains Mono
  position   = 0, -22
  halign     = center
  valign     = center
}

# ── User avatar ───────────────────────────────────────────────────
image {
  monitor  =
  path     = $HOME/.face
  size     = 64
  rounding = 0        # square — corp ID style
  border_size  = 2
  border_color = rgba(252, 238, 12, 0.70)
  position = 0, -100
  halign   = center
  valign   = center
}

# ── Username ──────────────────────────────────────────────────────
label {
  monitor    =
  text       = $USER
  color      = rgba(252, 238, 12, 0.80)
  font_size  = 13
  font_family= JetBrains Mono Bold
  position   = 0, -152
  halign     = center
  valign     = center
}

# ── Password input ────────────────────────────────────────────────
input-field {
  monitor    =
  size       = 280, 42
  position   = 0, -195
  halign     = center
  valign     = center

  outline_thickness   = 1
  dots_size           = 0.28
  dots_spacing        = 0.18
  dots_center         = true
  dots_rounding       = 0

  outer_color         = rgba(42, 42, 42, 0.80)
  inner_color         = rgba(10, 10, 10, 0.90)
  font_color          = rgba(252, 238, 12, 0.90)
  fade_on_empty       = true
  fade_timeout        = 1200
  placeholder_text    = <span font_family="JetBrains Mono" size="small">ENTER ACCESS CODE</span>

  check_color         = rgba(0, 255, 159, 1.0)
  fail_color          = rgba(255, 0, 60, 1.0)
  fail_text           = <span font_family="JetBrains Mono" size="small">ACCESS DENIED</span>
  fail_transition     = 300
  numlock_color       = rgba(252, 238, 12, 0.5)

  capslock_color      = rgba(255, 107, 53, 1.0)
  capslock_key_symbol = CAPS
  hide_input          = false
  rounding            = 0

  position            = 0, -195
}

# ── Hint ──────────────────────────────────────────────────────────
label {
  monitor    =
  text       = Wake the f**k up, Samurai.
  color      = rgba(85, 85, 85, 0.60)
  font_size  = 9
  font_family= JetBrains Mono
  position   = 0, -240
  halign     = center
  valign     = center
}

# ── Bottom accent bar ─────────────────────────────────────────────
shape {
  monitor  =
  size     = 100% 3
  color    = rgba(252, 238, 12, 0.40)
  position = 0, 1
  halign   = left
  valign   = bottom
  zindex   = 10
}
