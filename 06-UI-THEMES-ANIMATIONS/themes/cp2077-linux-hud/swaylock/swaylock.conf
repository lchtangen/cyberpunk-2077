# cp2077-linux-hud — swaylock config
# Cyberpunk 2077 lock screen for Sway / generic Wayland
# Copy to ~/.config/swaylock/config
# Requires: swaylock-effects (AUR) for blur support

# ── Appearance ────────────────────────────────────────────────────
image=~/.config/wallpapers/cp2077-nightcity.jpg
scaling=fill
# Fallback solid background if image not found:
color=0a0a0a

# Blur (swaylock-effects only)
effect-blur=7x5
effect-vignette=0.5:0.8

# ── Colors ────────────────────────────────────────────────────────
# Idle  (no input)
inside-color=00000000
ring-color=2a2a2acc
line-color=00000000
text-color=aaaaaa88
separator-color=00000000

# Verifying
inside-ver-color=00000000
ring-ver-color=00ffffff99
line-ver-color=00000000
text-ver-color=00ffffffcc
text-ver-text=VERIFYING…

# Wrong password
inside-wrong-color=ff003c22
ring-wrong-color=ff003ccc
line-wrong-color=00000000
text-wrong-color=ff003cff
text-wrong-text=ACCESS DENIED

# Cleared (after wrong → cleared)
inside-clear-color=00000000
ring-clear-color=fcee0c99
line-clear-color=00000000
text-clear-color=fcee0ccc
text-clear-text=

# Caps-lock indicator
inside-caps-lock-color=00000000
ring-caps-lock-color=ff6b35cc
line-caps-lock-color=00000000
text-caps-lock-color=ff6b35ff

# ── Layout ────────────────────────────────────────────────────────
font=JetBrains Mono
font-size=14
indicator-radius=45
indicator-thickness=3
indicator-caps-lock

# Hide cursor
hide-keyboard-layout
show-failed-attempts

# ── Grace period ──────────────────────────────────────────────────
grace=0
