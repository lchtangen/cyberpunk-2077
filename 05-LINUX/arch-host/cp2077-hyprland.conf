# cp2077-hyprland.conf — Unified CP2077 Hyprland theme config
# Merged from: cyber-hyprland-theme/theme.conf (BeardWarrior/taylor85345)
#              + cybrland dotfiles (scherrer-txt)
#              + CP2077 design tokens (#FCEE0C yellow, #00FFFF cyan)
#
# Source this from your main hyprland.conf:
#   source = ~/.config/hypr/themes/cp2077.conf
#
# Requires: eww, foot (or kitty), rofi, swww, hyprlock

# ── Monitor reserved space for Waybar (32px top bar + 4px margin) ─
monitor = , addreserved, 40, 0, 0, 0

# ── Window borders — corp terminal palette ────────────────────────
general {
    border_size           = 2
    col.active_border     = rgba(FCEE0Ccc) rgba(00FFFFcc) 45deg
    col.inactive_border   = rgba(2A2A2A88)
    gaps_in               = 6
    gaps_out              = 10
    resize_on_border      = true
    hover_icon_on_border  = true
}

# ── Decorations — Cyberpunk neon glow ─────────────────────────────
decoration {
    rounding      = 0

    active_opacity   = 1.0
    inactive_opacity = 0.92
    fullscreen_opacity = 1.0

    drop_shadow         = true
    shadow_range        = 20
    shadow_render_power = 3
    shadow_ignore_window = true
    shadow_offset       = 0 0
    col.shadow          = rgba(FCEE0C55)
    col.shadow_inactive = rgba(00000066)

    blur {
        enabled          = true
        size             = 8
        passes           = 3
        new_optimizations = true
        noise            = 0.03
        contrast         = 1.1
        brightness       = 0.9
    }
}

# ── Animations — glitch-snap feel ─────────────────────────────────
animations {
    enabled = true

    bezier = glitch,   0.05, 0.9, 0.1, 1.0
    bezier = snap,     0.16, 1.0, 0.3, 1.0
    bezier = fadeOut,  0.0,  0.0, 0.6, 1.0

    animation = windows,     1, 4,  snap,   slide
    animation = windowsOut,  1, 3,  fadeOut, slide
    animation = border,      1, 6,  glitch
    animation = borderangle, 1, 30, snap,   loop
    animation = fade,        1, 4,  glitch
    animation = workspaces,  1, 5,  snap,   slidevert
}

# ── Input ─────────────────────────────────────────────────────────
input {
    kb_layout    = us
    follow_mouse = 1
    sensitivity  = 0
    touchpad {
        natural_scroll   = true
        tap-to-click     = true
        drag_lock        = false
    }
}

# ── Layer rules — blur notification + rofi layers ─────────────────
layerrule = blur,         gtk-layer-shell
layerrule = ignorezero,   gtk-layer-shell
layerrule = blur,         notifications
layerrule = ignorezero,   notifications
layerrule = blur,         rofi
layerrule = ignorezero,   rofi
layerrule = blur,         waybar
layerrule = ignorezero,   waybar

# ── Window rules ──────────────────────────────────────────────────
windowrule = float,  class:^(pavucontrol)$
windowrule = float,  class:^(nm-connection-editor)$
windowrule = center, class:^(rofi)$
windowrule = float,  title:^(sys-monitor)$
windowrule = size 900 600, title:^(sys-monitor)$

# ── Startup ───────────────────────────────────────────────────────
exec-once = foot --server
exec-once = waybar
exec       = swww query || swww init
exec       = cp2077-wallpaper-daemon 1800
exec       = eww daemon

# ── Keybindings ───────────────────────────────────────────────────
$mod = SUPER

# Terminal
bind = $mod,       Return,  exec, footclient
bind = $mod SHIFT, Return,  exec, kitty

# Launcher (Rofi CP2077 theme)
bind = $mod,       D,       exec, rofi -show drun -theme ~/.config/rofi/themes/cp2077.rasi
bind = $mod,       R,       exec, rofi -show run  -theme ~/.config/rofi/themes/cp2077.rasi
bind = $mod SHIFT, D,       exec, rofi -show window -theme ~/.config/rofi/themes/cp2077.rasi

# eww HUD toggle (Super+H)
bind = $mod, H, exec, eww open --toggle cp2077-hud

# Waybar toggle
bind = $mod SHIFT, B, exec, pkill -SIGUSR1 waybar

# Wallpaper cycle
bind = $mod, W, exec, pkill -f cp2077-wallpaper-daemon; cp2077-wallpaper-daemon &

# Lock screen
bind = $mod, L, exec, hyprlock
bind = $mod CTRL, L, exec, swaylock

# Window management
bind = $mod, Q, killactive
bind = $mod, F, fullscreen
bind = $mod SHIFT, F, togglefloating
bind = $mod, P, pseudo

# Focus movement
bind = $mod, h, movefocus, l
bind = $mod, l, movefocus, r
bind = $mod, k, movefocus, u
bind = $mod, j, movefocus, d
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

# Window movement
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, l, movewindow, r
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, j, movewindow, d

# Workspaces 1-9
$ws = e+
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind  = $mod, mouse_down, workspace, e-1
bind  = $mod, mouse_up,   workspace, e+1
bindm = $mod, mouse:272,  movewindow
bindm = $mod, mouse:273,  resizewindow

# Volume / brightness (standard media keys)
bindel = , XF86AudioRaiseVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ +5%
bindel = , XF86AudioLowerVolume,  exec, pactl set-sink-volume @DEFAULT_SINK@ -5%
bindl  = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bindel = , XF86MonBrightnessUp,   exec, ~/.config/hypr/scripts/brightness.sh up
bindel = , XF86MonBrightnessDown, exec, ~/.config/hypr/scripts/brightness.sh down

# Screenshot (grim + slurp)
bind = ,      Print,      exec, grim - | wl-copy
bind = SHIFT, Print,      exec, grim -g "$(slurp)" - | wl-copy
bind = $mod,  Print,      exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# Power menu
bind = $mod SHIFT, E, exec, wlogout
