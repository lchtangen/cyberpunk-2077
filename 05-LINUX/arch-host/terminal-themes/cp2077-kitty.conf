# Cyberpunk 2077 — Kitty Color Theme
# Design tokens from cybrcolors/: https://github.com/cybrcolors
# Apply: add `include cp2077-kitty.conf` to kitty.conf

# --- Background / foreground ---
background              #0a0a0a
foreground              #fcee0c
selection_background    #2a2a2a
selection_foreground    #fcee0c
cursor                  #00ffff
cursor_text_color       #0a0a0a

# --- Normal 8 colors (0-7) ---
color0  #0a0a0a
color1  #ff003c
color2  #00ff9f
color3  #fcee0c
color4  #0050ff
color5  #ff6b35
color6  #00ffff
color7  #cccccc

# --- Bright 8 colors (8-15) ---
color8  #2a2a2a
color9  #ff003c
color10 #00ff9f
color11 #fcee0c
color12 #4d9fff
color13 #ff6b35
color14 #00ffff
color15 #ffffff

# --- Tab bar ---
active_tab_background   #fcee0c
active_tab_foreground   #0a0a0a
inactive_tab_background #2a2a2a
inactive_tab_foreground #888888

# --- URL color ---
url_color #00ffff
