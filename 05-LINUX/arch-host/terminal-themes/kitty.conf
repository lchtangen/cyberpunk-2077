# CP2077 Kitty color theme
# Merged from Cyberpunk-Neon (Roboron3042) + CP2077 design tokens
# Drop into ~/.config/kitty/kitty.conf or include with:
#   include ~/cyberpunk-2077/05-LINUX/arch-host/terminal-themes/kitty.conf

font_family      JetBrains Mono
bold_font        JetBrains Mono Bold
italic_font      JetBrains Mono Italic
bold_italic_font JetBrains Mono Bold Italic
font_size        11.0

cursor                #FCEE0C
cursor_text_color     #000000
cursor_shape          block
cursor_blink_interval 0.5

background            #000b1e
foreground            #00FFFF
selection_background  #711c91
selection_foreground  #00FFFF

# Black / Dark
color0  #0A0A0A
color8  #2A2A2A

# Red — danger / flatline / ACCESS DENIED
color1  #FF003C
color9  #FF003C

# Green — success / health / VERIFIED
color2  #00FF9F
color10 #00FF9F

# Yellow — primary / corp-ID / FCEE0C brand
color3  #FCEE0C
color11 #FCEE0C

# Blue — deep background accent
color4  #133e7c
color12 #1c61c2

# Magenta — netrunner purple
color5  #711c91
color13 #ea00d9

# Cyan — secondary / NETRUNNER UPLINK
color6  #00FFFF
color14 #00FFFF

# White / Text
color7  #AAAAAA
color15 #C0C0C0

url_color           #00FFFF
url_style           single

# Window styling
window_padding_width        8
hide_window_decorations     no
background_opacity          0.95
dynamic_background_opacity  yes

# Tab bar — corp terminal feel
tab_bar_style               powerline
tab_powerline_style         angled
active_tab_foreground       #000000
active_tab_background       #FCEE0C
inactive_tab_foreground     #555555
inactive_tab_background     #0A0A0A
tab_bar_background          #000b1e
